<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 1</title>
  <link rel="stylesheet" href="Project1.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div class="container">
    <h1><i class="fa-solid fa-pencil"></i>My Todo List</h1>
    <div class="input-section">
      <input type="text" id="todoInput" placeholder="Enter a task..." autocomplete="off">
      <button id="addBtn">Add</button>

    </div>
    <div id="todoList">
      <div class="empty-status">No tasks yet.Add one above</div>

    </div>
    <div class="stats">
      <span id="totalTodos">Total tasks:0</span>
    </div>
  </div>
  <script src="Project1.js"></script>
</body>

</html>
